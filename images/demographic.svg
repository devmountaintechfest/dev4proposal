<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <!-- Background -->
  <rect width="800" height="1000" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    DevMountain Demographics Analysis
  </text>

  <!-- Tech Job Distribution -->
  <g transform="translate(50, 80)">
    <text x="0" y="20" font-size="18" font-weight="bold" fill="#333">Technical Role Distribution</text>
    <g transform="translate(0, 40)">
      <!-- Bar Chart -->
      <rect x="0" y="0" width="310" height="20" fill="#0088FE"/>
      <rect x="0" y="30" width="77" height="20" fill="#00C49F"/>
      <rect x="0" y="60" width="88" height="20" fill="#FFBB28"/>
      <rect x="0" y="90" width="53" height="20" fill="#FF8042"/>
      <rect x="0" y="120" width="42" height="20" fill="#8884d8"/>
      
      <!-- Labels -->
      <text x="320" y="15" font-size="14">Software Dev/Eng (31.2%)</text>
      <text x="87" y="45" font-size="14">Full Stack (7.7%)</text>
      <text x="98" y="75" font-size="14">Tech Lead/Eng Mgr (8.8%)</text>
      <text x="63" y="105" font-size="14">DevOps/SRE (5.3%)</text>
      <text x="52" y="135" font-size="14">Data Eng (4.2%)</text>
    </g>
  </g>

  
  <!-- Experience Distribution Pie Chart -->
  <g transform="translate(400, 450)">
    <text x="0" y="-100" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Experience Distribution</text>
    <!-- Pie segments -->
    <path d="M0 0 L80 0 A80 80 0 0 1 24.7 76.1 Z" fill="#0088FE"/>
    <path d="M0 0 L24.7 76.1 A80 80 0 0 1 -62.8 49.7 Z" fill="#00C49F"/>
    <path d="M0 0 L-62.8 49.7 A80 80 0 0 1 -62.8 -49.7 Z" fill="#FFBB28"/>
    <path d="M0 0 L-62.8 -49.7 A80 80 0 0 1 0 -80 Z" fill="#FF8042"/>
    <!-- Labels -->
    <text x="90" y="0" font-size="12">0-2 years (22.1%)</text>
    <text x="30" y="90" font-size="12">3-5 years (27.1%)</text>
    <text x="-80" y="30" font-size="12">6-10 years (25.0%)</text>
    <text x="-80" y="-30" font-size="12">11+ years (25.8%)</text>
  </g>

  <!-- Attendee Types -->
  <g transform="translate(50, 600)">
    <text x="0" y="20" font-size="18" font-weight="bold" fill="#333">Attendee Types</text>
    <!-- Bar Chart -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="381" height="20" fill="#0088FE"/>
      <rect x="0" y="30" width="117" height="20" fill="#00C49F"/>
      <rect x="0" y="60" width="87" height="20" fill="#FFBB28"/>
      <rect x="0" y="90" width="70" height="20" fill="#FF8042"/>
      
      <!-- Labels -->
      <text x="391" y="15" font-size="14">Sponsors (38.1%)</text>
      <text x="127" y="45" font-size="14">Speakers (11.7%)</text>
      <text x="97" y="75" font-size="14">Education (8.7%)</text>
      <text x="80" y="105" font-size="14">Conference (7.0%)</text>
    </g>
  </g>

  <!-- Key Insights -->
  <g transform="translate(50, 800)">
    <text x="0" y="20" font-size="18" font-weight="bold" fill="#333">Key Insights</text>
    <text x="0" y="50" font-size="14">• Software Developers make up largest group (31.2%)</text>
    <text x="0" y="75" font-size="14">• Mid-level professionals represent over 50%</text>
    <text x="0" y="100" font-size="14">• Strong representation of technical leaders (14.1%)</text>
    <text x="0" y="125" font-size="14">• Emerging focus on DevOps and Cloud (9.8%)</text>
  </g>
</svg>